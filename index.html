
<table class="table table-striped">
  <thead>
    <tr>
      <th>total</th>
    </tr>
  </thead>
  <tbody id="results"></tbody>
</table>




<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>

<script>
// Format numbers
function addCommas(nStr) {
  nStr += "";
  var x = nStr.split(".");
  var x1 = x[0];
  var x2 = x.length > 1 ? "." + x[1] : "";
  var rgx = /(\d+)(\d{3})/;
  while (rgx.test(x1)) {
    x1 = x1.replace(rgx, "$1" + "," + "$2");
  }
  return x1 + x2;
}

// Store the Sheet ID
var googleSheetKey = "1oMnevZhbW0c5sd9zCx5hV9f8XMP5JB6mPxHagk_8OUI";
var theSheet; //Save the preloaded JSON object here

//First Json Source
$.ajax({
  url: "https://spreadsheets.google.com/feeds/list/" +
    googleSheetKey +
    "/od6/public/values?alt=json-in-script",
  dataType: "jsonp",
  success: function(jsonFromSheet) {
    theSheet = jsonFromSheet;
    // console.log(theSheet);
  }
});

// Begin Markup
window.onload = function() {
  table = "";
  $x = 0;

  // Loop through sheet rows
  theSheet.feed.entry.forEach(function(row) {
    $x++;

    // Get Salesmen's Sales Totals
    var total= parseFloat(row.gsx$total.$t);


    tableRow = "<tr>";
    tableRow += "<td>" + row.gsx$total.$t + "</td>";
    tableRow += "</tr>";
    table += tableRow;
  });

  $("#results").html(table);
  return false;
};
</script>
